global:
  environment: prod

backend:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "512Mi" }
    limits:   { cpu: "2000m", memory: "2Gi" }

ragService:
  replicas: 3
  resources:
    requests: { cpu: "1000m", memory: "1Gi" }
    limits:   { cpu: "4000m", memory: "4Gi" }

autoscaling:
  minReplicas: 3
  maxReplicas: 20
