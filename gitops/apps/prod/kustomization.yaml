apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ../../base/addons.yaml
  - ../../base/genai.yaml
patches:
  - target:
      kind: Application
      name: genai-platform
    patch: |
      - op: replace
        path: /spec/source/helm/valueFiles
        value:
          - values.yaml
          - values-prod.yaml
